name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build, test, and lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: ktlint
        run: ./gradlew ktlintCheck

      - name: Compile all targets
        run: |
          ./gradlew \
            compileKotlinDesktop \
            compileKotlinWasmJs \
            compileDebugKotlinAndroid \
            compileKotlinIosX64

      - name: Tests (commonTest on every target)
        run: ./gradlew allTests

      - name: Build distributable artifacts
        run: ./gradlew assembleDebug wasmJsBrowserProductionWebpack

  commit-style:
    name: Conventional commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          # Skip GitHub's synthetic merge commit (would fail `cz check`).
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install commitizen
        run: pip install commitizen

      - name: Lint commits against base branch
        run: |
          range="origin/${{ github.base_ref }}..HEAD"
          if [ -z "$(git rev-list "$range")" ]; then
            echo "No new commits vs base; skipping cz check."
            exit 0
          fi
          cz check --rev-range "$range"
